# =============================================================================
# Composable CI/CD Pipeline (artifacts)
# =============================================================================
#
# This workflow calls the shared-workflows building blocks individually, giving
# you full control over the pipeline stages. Uncomment the jobs below to enable.
#
# WHEN TO USE THIS:
#   Choose this if you need custom steps between pipeline stages -- for example,
#   integration tests after build but before signing, or parallel deploys to
#   multiple targets.
#
# WHEN TO USE cicd-standard.yaml INSTEAD:
#   Choose standard if a single orchestrated call (build -> sign -> deploy)
#   with no custom steps in between is sufficient.
#
# PIPELINE FLOW:
#   extract-version -> build -> collect -> [your tests] -> sign -> deploy
#
# BUILD-ID SCHEME:
#   Per-build metadata:  {run_id}-{run_attempt}-buildinfo-{unique-suffix}
#   Deploy parent:       {run_id}-{run_attempt}
#   Metadata prefix:     {run_id}-{run_attempt}-buildinfo
#
# GETTING STARTED:
#   1. Replace the triggers and no-op job below with the commented-out pipeline
#   2. Replace the dummy build-script with your actual build commands
#   3. Run setup.sh to replace template values, or edit them manually
#   4. Add the CI/CD check name to your branch protection ruleset
#
# DOCS:
#   Composable pipeline:  https://github.com/aerospike/shared-workflows/blob/main/.github/workflows/docs/CICD-composable.md
#   Full multi-ecosystem example: https://github.com/aerospike/shared-workflows/blob/main/.github/workflows/example_composable-matrix.yaml
#   Release bundles:      https://github.com/aerospike/shared-workflows/blob/main/.github/workflows/docs/release-bundles.md

name: CI/CD (composable)

on: workflow_dispatch

jobs:
