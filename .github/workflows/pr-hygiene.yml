name: PR Hygiene - Jira Ticket in Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate-jira-ticket:
    uses: aerospike/shared-workflows/.github/workflows/reusable_pr-hygiene.yml@74c474f40d62f9d2c1f90a8bc5df4b26cc5456d4 # post-v3.0.0
    with:
      pr_title: ${{ github.event.pull_request.title }}
