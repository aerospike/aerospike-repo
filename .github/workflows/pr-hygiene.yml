name: PR Hygiene - Jira Ticket in Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate-jira-ticket:
    uses: aerospike/shared-workflows/.github/workflows/reusable_pr-hygiene.yml@462ba635ea5045e7282ce49eb665eec31454f3d4 # post-v3.0.0
    with:
      pr_title: ${{ github.event.pull_request.title }}
