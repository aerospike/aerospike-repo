# =============================================================================
# Standard CI/CD Pipeline (artifacts)
# =============================================================================
#
# This workflow uses the shared-workflows orchestrator to handle the full
# build -> sign -> deploy lifecycle. Uncomment the jobs below to enable.
#
# WHEN TO USE THIS:
#   Choose this if you want a single workflow call that handles everything.
#   You provide a build script and configuration; the orchestrator does the rest.
#
# WHEN TO USE cicd-composable.yaml INSTEAD:
#   Choose composable if you need custom steps between pipeline stages
#   (e.g., integration tests after build but before signing).
#
# GETTING STARTED:
#   1. Replace the triggers and no-op job below with the commented-out pipeline
#   2. Replace the dummy build-script with your actual build commands
#   3. Run setup.sh to replace template values, or edit them manually
#   4. Edit setup-github-protection.sh to add your CI/CD check name
#      to the CHECKS variable, then re-run it to update the ruleset
#
# DOCS:
#   Standard pipeline:  https://github.com/aerospike/shared-workflows/blob/main/.github/workflows/docs/CICD-standard.md
#   Matrix builds:      https://github.com/aerospike/shared-workflows/blob/main/.github/workflows/docs/artifacts-cicd-matrix.schema.json
#   Full example:       https://github.com/aerospike/shared-workflows/blob/main/.github/workflows/example_artifacts-cicd.yaml
#
# ADVANCED OPTIONS (add to the cicd job when needed):
#
#   Multi-platform matrix builds:
#       matrix-json: >-
#         {"include":[
#           {"runs-on":"ubuntu-22.04","distro":"jammy","arch":"x86_64"},
#           {"runs-on":"ubuntu-22.04","distro":"el9","arch":"x86_64"}
#         ]}
#
#   Java/Maven setup:
#       setup-java: true
#       java-version: "21"
#       java-distribution: temurin
#       java-cache: maven
#       jar-group-id: com.aerospike
#
#   Dotnet setup:
#       setup-dotnet: true
#       dotnet-version: "8.0"

